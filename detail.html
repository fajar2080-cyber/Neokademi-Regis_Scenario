<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Kelas | Neokademi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#4F46E5', primaryHover: '#4338CA', darkBg: '#0f172a', darkCard: '#1e293b' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .banner-overlay { background: linear-gradient(135deg, rgba(15, 23, 42, 0.95) 0%, rgba(15, 23, 42, 0.8) 100%), url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070&auto=format&fit=crop') center/cover; }
        .sticky-sidebar { position: sticky; top: 100px; }
    </style>
</head>
<body class="bg-[#FAFAFA] text-gray-800 dark:bg-darkBg dark:text-gray-100 antialiased min-h-screen flex flex-col">

    <nav class="sticky top-0 z-50 bg-white/90 dark:bg-darkBg/90 backdrop-blur-lg border-b border-gray-100 dark:border-gray-800 transition-colors">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex items-center">
                    <img src="assets/img/Neokademi.png" alt="Logo" class="w-10 h-10 object-contain mr-3">
                    <span class="font-extrabold text-2xl dark:text-white">Neokademi</span>
                </a>
                <div class="hidden md:flex items-center space-x-5">
                    <div id="nav-auth-container">
                        <a href="login.html" class="px-6 py-2.5 rounded-full text-white font-semibold bg-primary hover:bg-primaryHover transition-all">Login</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="banner-overlay w-full py-16 text-white">
        <div class="max-w-7xl mx-auto px-4">
            <h1 id="detail-title" class="text-4xl md:text-5xl font-extrabold mb-4">Memuat Judul...</h1>
        </div>
    </div>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-10 w-full">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white dark:bg-darkCard p-8 rounded-[2rem] border border-gray-100 dark:border-gray-800 shadow-sm">
                    <h2 class="text-2xl font-bold mb-4">Tentang Course</h2>
                    <p id="detail-desc" class="text-gray-600 dark:text-gray-400">Memuat...</p>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-white dark:bg-darkCard rounded-[2rem] border border-gray-100 dark:border-gray-800 shadow-xl overflow-hidden sticky-sidebar">
                    <div class="p-6">
                        <div id="sidebar-action-buttons" class="space-y-4 mb-6"></div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyJcarKrJQUYKMK81f531gpgwY8UVQxSVz6NExABGst1fnprd8DnCdhIH0VpQzeDg/exec'; // GANTI URL INI

        const modulData = {
            linux: {
                title: "Linux System Administration",
                desc: "Pelajari Linux dari nol. Mulai dari perintah dasar terminal hingga setup web server.",
                checkoutLink: "https://lynk.id/drawhen02/6k3o6e37q11q"
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        let modulKey = urlParams.get('modul') || 'linux'; 
        const data = modulData[modulKey];

        document.getElementById('detail-title').textContent = data.title;
        document.getElementById('detail-desc').textContent = data.desc;

        // Cek Sesi
        const rawSession = localStorage.getItem('neokademi_user');
        let session = null;
        let isEnrolled = false;

        async function checkEnrollmentStatus(email) {
            try {
                const response = await fetch(`${GAS_URL}?action=getProgress&email=${encodeURIComponent(email)}`);
                const result = await response.json();
                if (result.status === 'success') {
                    isEnrolled = true;
                    renderSidebar();
                } else {
                    isEnrolled = false;
                    renderSidebar();
                }
            } catch (e) {
                isEnrolled = false;
                renderSidebar();
            }
        }

        if (rawSession) {
            session = JSON.parse(rawSession);
            document.getElementById('nav-auth-container').innerHTML = `<a href="my-courses.html" class="px-6 py-2 bg-gray-100 dark:bg-gray-800 rounded-full font-bold">Dashboard</a>`;
            checkEnrollmentStatus(session.email); // Cek hak akses ke backend
        } else {
            renderSidebar(); // Tamu
        }

        function renderSidebar() {
            const btnContainer = document.getElementById('sidebar-action-buttons');
            
            if (!session) {
                // TAMU (BELUM LOGIN)
                btnContainer.innerHTML = `
                    <div class="p-4 bg-blue-50 dark:bg-blue-900/20 rounded-xl mb-4 border border-blue-100 dark:border-blue-800 text-center">
                        <p class="text-sm font-semibold text-blue-800 dark:text-blue-300">Login untuk mendaftar kelas ini</p>
                    </div>
                    <a href="login.html?redirect=detail.html?modul=${modulKey}" class="w-full flex items-center justify-center py-4 bg-primary text-white font-bold rounded-xl shadow-lg">Login / Daftar Akun</a>
                `;
            } else if (!isEnrolled) {
                // LOGIN, TAPI BELUM PUNYA MODUL (MUNCULKAN REDEEM DI SINI)
                btnContainer.innerHTML = `
                    <a href="${data.checkoutLink}" target="_blank" class="w-full flex items-center justify-center py-4 bg-primary text-white font-bold rounded-xl shadow-lg hover:-translate-y-1 transition-all">
                        <i class="fa-solid fa-cart-shopping mr-2"></i> Beli Kelas (Lynk.id)
                    </a>
                    
                    <div class="mt-6 pt-6 border-t border-gray-100 dark:border-gray-800">
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Punya Kode Lisensi?</p>
                        <form id="redeem-form" class="space-y-3">
                            <input type="text" id="passkey-input" required class="w-full px-4 py-3 border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkBg rounded-xl text-sm font-mono font-bold uppercase" placeholder="LNX-XXXXXX">
                            <button type="submit" id="btn-redeem" class="w-full py-3 bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-bold rounded-xl">Aktivasi Kelas</button>
                            <p id="redeem-msg" class="text-xs text-center mt-2 font-medium"></p>
                        </form>
                    </div>
                `;

                // Logic Form Redeem di Detail Page
                document.getElementById('redeem-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const passkey = document.getElementById('passkey-input').value.trim();
                    const btnRedeem = document.getElementById('btn-redeem');
                    const msg = document.getElementById('redeem-msg');

                    btnRedeem.disabled = true;
                    btnRedeem.textContent = "Memvalidasi...";

                    try {
                        const response = await fetch(`${GAS_URL}?action=redeem_passkey&email=${encodeURIComponent(session.email)}&passkey=${encodeURIComponent(passkey)}`);
                        const result = await response.json();

                        if (result.status === 'success') {
                            msg.className = "text-xs text-center mt-2 font-bold text-emerald-500";
                            msg.textContent = "Berhasil! Mengarahkan ke kelas...";
                            setTimeout(() => { window.location.href = 'aktivasi-berhasil.html?modul=' + modulKey; }, 1500);
                        } else {
                            msg.className = "text-xs text-center mt-2 font-bold text-red-500";
                            msg.textContent = result.message || "Kode tidak valid.";
                            btnRedeem.disabled = false;
                            btnRedeem.textContent = "Aktivasi Kelas";
                        }
                    } catch (error) {
                        msg.textContent = "Koneksi terputus.";
                        btnRedeem.disabled = false;
                    }
                });

            } else {
                // LOGIN & SUDAH PUNYA MODUL
                btnContainer.innerHTML = `
                    <div class="text-center mb-3">
                        <span class="text-emerald-500 font-bold text-[14px]"><i class="fa-solid fa-circle-check"></i> Modul Terbuka</span>
                    </div>
                    <button onclick="lanjutBelajar()" class="w-full py-4 bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-bold rounded-xl shadow-lg">
                        Masuk Ruang Kelas <i class="fa-solid fa-arrow-right ml-2"></i>
                    </button>
                `;
            }
        }

        function lanjutBelajar() {
            session.modul = modulKey;
            localStorage.setItem('neokademi_user', JSON.stringify(session));
            window.location.href = 'materi.html';
        }
    </script>
</body>
</html>
