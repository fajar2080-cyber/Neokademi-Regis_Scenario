<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun | Neokademi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5', 
                        primaryHover: '#4338CA',
                        secondary: '#F3F4F6',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        html { scroll-behavior: smooth; font-family: 'Inter', sans-serif; }
        body { transition: background-color 0.3s, color 0.3s; overflow-x: hidden; }
        
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.5s ease-out forwards; }

        .icon-spin-transition {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease;
        }

        /* Hilangkan icon mata bawaan browser pada input password */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }
    </style>
</head>
<body class="bg-[#FAFAFA] text-gray-800 dark:bg-darkBg dark:text-gray-100 antialiased min-h-screen flex flex-col">

    <nav class="sticky top-0 z-50 bg-white/90 dark:bg-darkBg/90 backdrop-blur-lg border-b border-gray-100 dark:border-gray-800 transition-colors">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                 <a href="index.html" class="flex items-center cursor-pointer">
                    <img src="assets/img/Neokademi.png" alt="Logo Neokademi" class="w-10 h-10 object-contain mr-3" onerror="this.src='https://ui-avatars.com/api/?name=NK&background=4F46E5&color=fff'">
                    <span class="font-extrabold text-2xl tracking-tight text-gray-900 dark:text-white">Neokademi</span>
                </a>
                <div class="flex items-center space-x-5">
                    <button id="theme-toggle" class="text-gray-400 hover:text-amber-500 dark:text-gray-500 dark:hover:text-amber-400 focus:outline-none flex items-center justify-center transition-colors">
                        <i id="theme-icon" class="fa-solid fa-moon text-[1.3rem] icon-spin-transition"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 dark:bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
        
        <div class="max-w-md w-full space-y-8 bg-white dark:bg-darkCard p-8 md:p-10 rounded-[2.5rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none border border-gray-100 dark:border-gray-800 relative z-10 animate-fade-in-up">
            
            <div class="text-center">
                <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">Buat Akun Baru</h2>
                <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">
                    Satu langkah lagi untuk memulai karir IT Anda.
                </p>
            </div>
            
            <form id="register-form" class="mt-8 space-y-5">
                <div id="alert-box" class="hidden p-4 rounded-xl text-sm font-medium mb-4 transition-all" role="alert">
                    <span id="alert-message" class="flex items-center"></span>
                </div>

                <div class="space-y-4">
                    <div>
                        <label for="nama" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5 ml-1">Nama Lengkap</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-regular fa-user text-gray-400"></i>
                            </div>
                            <input id="nama" name="nama" type="text" required class="appearance-none rounded-xl relative block w-full px-4 py-3.5 pl-11 border border-gray-200 dark:border-gray-700 placeholder-gray-400 text-gray-900 dark:text-white bg-gray-50 dark:bg-darkBg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary sm:text-sm transition-colors font-medium" placeholder="Cth: Budi Santoso">
                        </div>
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5 ml-1">Alamat Email</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-regular fa-envelope text-gray-400"></i>
                            </div>
                            <input id="email" name="email" type="email" required class="appearance-none rounded-xl relative block w-full px-4 py-3.5 pl-11 border border-gray-200 dark:border-gray-700 placeholder-gray-400 text-gray-900 dark:text-white bg-gray-50 dark:bg-darkBg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary sm:text-sm transition-colors font-medium" placeholder="nama@email.com">
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5 ml-1">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-solid fa-lock text-gray-400"></i>
                            </div>
                            <input id="password" name="password" type="password" required minlength="6" class="appearance-none rounded-xl relative block w-full px-4 py-3.5 pl-11 pr-10 border border-gray-200 dark:border-gray-700 placeholder-gray-400 text-gray-900 dark:text-white bg-gray-50 dark:bg-darkBg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary sm:text-sm transition-colors font-medium" placeholder="Minimal 6 karakter">
                            <button type="button" onclick="togglePassword('password', 'eye-icon-1')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-primary transition-colors focus:outline-none">
                                <i id="eye-icon-1" class="fa-regular fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label for="confirm_password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5 ml-1">Konfirmasi Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-solid fa-shield-check text-gray-400"></i>
                            </div>
                            <input id="confirm_password" name="confirm_password" type="password" required minlength="6" class="appearance-none rounded-xl relative block w-full px-4 py-3.5 pl-11 pr-10 border border-gray-200 dark:border-gray-700 placeholder-gray-400 text-gray-900 dark:text-white bg-gray-50 dark:bg-darkBg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary sm:text-sm transition-colors font-medium" placeholder="Ulangi password Anda">
                            <button type="button" onclick="togglePassword('confirm_password', 'eye-icon-2')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-primary transition-colors focus:outline-none">
                                <i id="eye-icon-2" class="fa-regular fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" id="btn-submit" class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-primary hover:bg-primaryHover focus:outline-none shadow-lg shadow-primary/30 transition-all disabled:opacity-70 disabled:cursor-not-allowed hover:-translate-y-0.5">
                        <span id="btn-text">Daftar Sekarang</span>
                        <i id="btn-spinner" class="fa-solid fa-circle-notch fa-spin hidden ml-2 mt-0.5"></i>
                    </button>
                </div>
            </form>
            
            <div class="text-center pt-2">
                <p class="text-sm text-gray-500 dark:text-gray-400">Sudah punya akun? <br class="sm:hidden">
                    <a id="login-link" href="login.html" class="font-bold text-primary hover:text-primaryHover ml-1 transition-colors underline decoration-2 underline-offset-2 decoration-primary/30">Masuk di sini</a>
                </p>
            </div>
        </div>
    </main>

    <script>
        // --- Dark Mode Logic ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
            updateIcons('dark');
        } else {
            html.classList.remove('dark');
            updateIcons('light');
        }

        function toggleTheme() {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
                updateIcons('light');
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
                updateIcons('dark');
            }
        }

        function updateIcons(theme) {
            const iconClassNew = theme === 'dark' ? 'fa-sun' : 'fa-moon';
            const iconClassOld = theme === 'dark' ? 'fa-moon' : 'fa-sun';
            themeIcon.classList.add('rotate-180');
            setTimeout(() => {
                themeIcon.classList.replace(iconClassOld, iconClassNew);
                themeIcon.classList.remove('rotate-180');
            }, 150);
        }
        themeToggleBtn.addEventListener('click', toggleTheme);

        // --- Toggle Password Visibility ---
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // --- Routing Logic (Membawa Parameter Redirect) ---
        const urlParams = new URLSearchParams(window.location.search);
        const redirectParam = urlParams.get('redirect');
        
        // Teruskan parameter redirect ke halaman login jika user klik "Masuk di sini"
        if (redirectParam) {
            document.getElementById('login-link').href = 'login.html?redirect=' + encodeURIComponent(redirectParam);
        }

        // --- Register Form Fetch Logic ---
        const registerForm = document.getElementById('register-form');
        const btnSubmit = document.getElementById('btn-submit');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const alertBox = document.getElementById('alert-box');
        const alertMessage = document.getElementById('alert-message');

        // URL GOOGLE APPS SCRIPT (Akan dibuat di tahap selanjutnya)
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyJcarKrJQUYKMK81f531gpgwY8UVQxSVz6NExABGst1fnprd8DnCdhIH0VpQzeDg/exec'; 

        function showAlert(message, type) {
            alertBox.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'border-red-200', 'bg-green-50', 'text-green-600', 'border-green-200', 'border');
            alertBox.classList.add('border');
            
            if(type === 'error') {
                alertBox.classList.add('bg-red-50', 'text-red-600', 'border-red-200', 'dark:bg-red-900/30', 'dark:text-red-400', 'dark:border-red-800/50');
                alertMessage.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2 text-lg"></i> ${message}`;
            } else {
                alertBox.classList.add('bg-green-50', 'text-green-600', 'border-green-200', 'dark:bg-green-900/30', 'dark:text-green-400', 'dark:border-green-800/50');
                alertMessage.innerHTML = `<i class="fa-solid fa-circle-check mr-2 text-lg"></i> ${message}`;
            }
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nama = document.getElementById('nama').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            // Validasi Password Match
            if (password !== confirmPassword) {
                showAlert('Konfirmasi password tidak cocok.', 'error');
                return;
            }

            // Ubah state tombol
            btnSubmit.disabled = true;
            btnText.textContent = 'Mendaftarkan Akun...';
            btnSpinner.classList.remove('hidden');
            alertBox.classList.add('hidden');

            try {
                // Konfigurasi fetch ke backend GAS (action=register)
                // Catatan: Payload dikirim sebagai JSON stringified dalam metode POST
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8', // Menghindari CORS preflight
                    },
                    body: JSON.stringify({
                        action: 'register',
                        nama: nama,
                        email: email,
                        password: password
                    })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    showAlert('Pendaftaran berhasil! Mengarahkan ke halaman login...', 'success');
                    
                    // Delay sejenak agar user membaca pesan sukses, lalu redirect
                    setTimeout(() => {
                        const targetUrl = redirectParam ? 
                            'login.html?redirect=' + encodeURIComponent(redirectParam) : 
                            'login.html';
                        window.location.href = targetUrl;
                    }, 2000);

                } else {
                    // Menangkap error dari backend (misal: Email sudah terdaftar)
                    showAlert(result.message || 'Pendaftaran gagal. Silakan coba lagi.', 'error');
                    btnSubmit.disabled = false;
                    btnText.textContent = 'Daftar Sekarang';
                    btnSpinner.classList.add('hidden');
                }

            } catch (error) {
                console.error('Error:', error);
                // Karena backend GAS belum diupdate dengan script baru, error ini mungkin muncul saat ujicoba
                showAlert('Tidak dapat terhubung ke server database.', 'error');
                btnSubmit.disabled = false;
                btnText.textContent = 'Daftar Sekarang';
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
