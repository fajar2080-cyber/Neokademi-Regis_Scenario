<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses | Neokademi Dashboard</title>
    <script>
        const sessionData = localStorage.getItem('neokademi_user');
        if (!sessionData) { window.location.replace('login.html'); }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#4F46E5', darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>
    <style> body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; } </style>
</head>
<body class="bg-[#FAFAFA] text-gray-800 dark:bg-darkBg dark:text-gray-100 antialiased min-h-screen flex flex-col">

    <nav class="sticky top-0 z-50 bg-white/90 dark:bg-darkCard/90 backdrop-blur-lg border-b border-gray-200 dark:border-gray-800 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-[76px] flex justify-between items-center">
             <a href="index.html" class="flex items-center">
                <img src="assets/img/Neokademi.png" class="w-10 h-10 mr-3">
                <span class="font-extrabold text-2xl dark:text-white">Neokademi</span>
            </a>
            <div class="flex items-center space-x-4">
                <a href="kelas-list.html" class="text-sm font-semibold text-gray-600 dark:text-gray-300 mr-4">Katalog Kelas</a>
                <button onclick="logout()" class="px-4 py-2 bg-red-50 text-red-600 rounded-lg text-sm font-bold">Logout</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-10 w-full">
        <div class="mb-10">
            <h1 class="text-3xl font-extrabold mb-2" id="welcome-text">My Courses</h1>
            <p class="text-gray-500">Lanjutkan progres belajar Anda.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div id="courses-container" class="space-y-4">
                    <p class="text-gray-500">Memuat modul Anda...</p>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-gradient-to-br from-primary to-blue-400 rounded-[2rem] p-8 text-white shadow-xl">
                    <h3 class="text-2xl font-bold mb-2">Tingkatkan Skillmu!</h3>
                    <p class="text-blue-100 text-sm mb-6 leading-relaxed">Punya kode lisensi dari email atau ingin membeli modul baru? Jelajahi katalog kelas kami.</p>
                    <a href="kelas-list.html" class="w-full block text-center py-3.5 bg-white text-primary font-bold rounded-xl hover:bg-gray-50 transition-colors shadow-md">
                        Lihat Katalog Kelas
                    </a>
                </div>
            </div>

        </div>
    </main>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyJcarKrJQUYKMK81f531gpgwY8UVQxSVz6NExABGst1fnprd8DnCdhIH0VpQzeDg/exec'; // GANTI URL INI

        const session = JSON.parse(localStorage.getItem('neokademi_user'));
        document.getElementById('welcome-text').textContent = "Hi, " + (session.name || session.email.split('@')[0]);

        async function fetchMyCourses() {
            const container = document.getElementById('courses-container');
            try {
                const response = await fetch(`${GAS_URL}?action=get_my_courses&email=${encodeURIComponent(session.email)}`);
                const result = await response.json();
                container.innerHTML = ''; 

                if (result.status === 'success' && result.data.length > 0) {
                    result.data.forEach(data => {
                        let percent = 0;
                        if(data.progressRaw) percent = Math.round((data.progressRaw.split(',').length / 7) * 100);
                        
                        container.innerHTML += `
                            <div class="bg-white dark:bg-darkCard rounded-2xl border border-gray-200 dark:border-gray-800 p-6 flex flex-col sm:flex-row gap-6 items-center shadow-sm">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/a/af/Tux.png" class="h-20">
                                <div class="flex-1 w-full">
                                    <h3 class="text-xl font-bold mb-2">Linux System Administration</h3>
                                    <div class="w-full h-2 bg-gray-100 rounded-full mb-3"><div class="h-full bg-emerald-500 rounded-full" style="width: ${percent}%"></div></div>
                                    <button onclick="lanjutBelajar('${data.modulId}')" class="w-full sm:w-auto px-6 py-2.5 bg-gray-900 text-white dark:bg-white dark:text-gray-900 text-sm font-bold rounded-xl">Lanjut Belajar</button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = `<div class="bg-white p-8 rounded-2xl border text-center"><p class="text-gray-500 font-medium">Anda belum memiliki kelas aktif.</p></div>`;
                }
            } catch (error) {
                container.innerHTML = `<p class="text-red-500">Gagal memuat data.</p>`;
            }
        }

        function lanjutBelajar(modulId) {
            session.modul = modulId;
            localStorage.setItem('neokademi_user', JSON.stringify(session));
            window.location.href = 'materi.html';
        }

        function logout() {
            localStorage.removeItem('neokademi_user');
            window.location.href = 'login.html';
        }

        fetchMyCourses();
    </script>
</body>
</html>
